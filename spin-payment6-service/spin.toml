spin_manifest_version = 2

[application]
name = "spin-payment6-service"
version = "0.1.0"
description = "Go WASM payment service with Dapr sidecar - state store & service invocation"

[[trigger.http]]
route = "/..."
component = "spin-payment6-service"

[component.spin-payment6-service]
source = "main.wasm"
allowed_outbound_hosts = [
    "http://127.0.0.1:3513",
]
[component.spin-payment6-service.build]
command = "tinygo build -target=wasip1 -buildmode=c-shared -no-debug -o main.wasm ."
watch = ["**/*.go", "go.mod"]
