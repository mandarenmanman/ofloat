spin_manifest_version = 2

[application]
name = "spin-python-app"
version = "0.1.0"
authors = ["aGentleKnife <1793575354@qq.com>"]
description = ""

[[trigger.http]]
route = "/..."
component = "spin-python-app"

[component.spin-python-app]
source = "app.wasm"
allowed_outbound_hosts = [
    "http://127.0.0.1:3500",
]
[component.spin-python-app.build]
command = "componentize-py -w spin-http componentize app -o app.wasm"
watch = ["*.py"]
