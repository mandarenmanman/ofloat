spin_manifest_version = 2

[application]
name = "spin-payment-service"
version = "0.1.0"
description = "Go WASM payment service with Dapr sidecar"

[[trigger.http]]
route = "/..."
component = "spin-payment-service"

[component.spin-payment-service]
source = "main.wasm"
allowed_outbound_hosts = [
    "http://127.0.0.1:3508",
]
[component.spin-payment-service.build]
command = "tinygo build -target=wasip1 -buildmode=c-shared -no-debug -o main.wasm ."
watch = ["**/*.go", "go.mod"]
