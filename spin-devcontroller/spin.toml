spin_manifest_version = 2

[application]
name = "spin-devcontroller"
version = "0.1.0"
description = "DevController Go WASM app with Dapr sidecar"

[[trigger.http]]
route = "/..."
component = "spin-devcontroller"

[component.spin-devcontroller]
source = "main.wasm"
allowed_outbound_hosts = [
    "http://127.0.0.1:3510",
]
[component.spin-devcontroller.build]
command = "tinygo build -target=wasip1 -gc=leaking -buildmode=c-shared -no-debug -go-compatibility=false -o main.wasm ."
watch = ["**/*.go", "go.mod"]
